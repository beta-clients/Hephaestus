plugins {
    id 'java'
    id 'com.github.johnrengelman.shadow' version '7.1.2'
}

group = 'com.github.qe7.hephaestus'
version = '2.0.0'

repositories {
    mavenCentral()
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

tasks.withType(Javadoc).configureEach {
    options.encoding = 'UTF-8'
}

tasks.withType(JavaExec).configureEach {
    def osType = System.getProperty('os.name').toLowerCase().contains('windows') ? 'windows' : 'linux'
    systemProperty 'java.library.path', "${projectDir}${File.separator}test_natives${File.separator}${osType}"
}

dependencies {
    implementation 'com.google.code.gson:gson:2.11.0'

    implementation fileTree(dir: 'workspace/bin', include: ['*.jar'])

    compileOnly 'org.projectlombok:lombok:1.18.34'
    annotationProcessor 'org.projectlombok:lombok:1.18.34'

    testCompileOnly 'org.projectlombok:lombok:1.18.34'
    testAnnotationProcessor 'org.projectlombok:lombok:1.18.34'
}

shadowJar {
    mergeServiceFiles()
}

build.dependsOn shadowJar

// Add generated build constants (git info) and include in sources
def generatedBuildConstantsDir = layout.buildDirectory.dir("generated/sources/buildconstants/java").get().asFile

// ensure the generated dir is part of the main java source set
sourceSets.main.java.srcDir generatedBuildConstantsDir

def getCommitHash = { ->
    def gitProcess = 'git rev-parse HEAD'.execute()
    gitProcess.waitFor()
    return gitProcess.text.trim().take(10)
}

def getBranchName = { ->
    def gitProcess = 'git rev-parse --abbrev-ref HEAD'.execute()
    gitProcess.waitFor()
    return gitProcess.text.trim()
}

def getRevisionCount = { ->
    def gitProcess = 'git rev-list --all --count'.execute()
    gitProcess.waitFor()
    return gitProcess.text.trim()
}

tasks.register('generateBuildConstants') {
    outputs.dir generatedBuildConstantsDir
    doLast {
        generatedBuildConstantsDir.mkdirs()
        def packagePath = 'com.github.qe7.hephaestus'.replace('.', '/')
        def targetDir = new File(generatedBuildConstantsDir, packagePath)
        targetDir.mkdirs()

        def gitCommit = getCommitHash()
        def gitBranch = getBranchName()
        def gitRevision = getRevisionCount()

        def constantsFile = new File(targetDir, 'BuildConstants.java')
        constantsFile.text = """package com.github.qe7.hephaestus;

public final class BuildConstants {
    public static final String GIT_COMMIT = \"${gitCommit}\";
    public static final String GIT_BRANCH = \"${gitBranch}\";
    public static final String GIT_REVISION = \"${gitRevision}\";
    private BuildConstants() {}
}
		"""
    }
}

sourceSets.main.java.srcDirs += generatedBuildConstantsDir
tasks.named('compileJava') {
    dependsOn tasks.named('generateBuildConstants')
}
tasks.matching { it.name == 'sourcesJar' }.configureEach {
    dependsOn tasks.named('generateBuildConstants')
}
